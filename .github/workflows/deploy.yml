name: CI/CD Pipeline (Hybrid)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.dockerignore'
      - '.gitignore'
      - 'docs/**'
      - '**/*.md'
      - '.air.toml'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-local:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry (Local)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Process
        env:
          ENV_FILE_CONTENT: ${{ secrets.PROD_ENV_FILE }}
        run: |
          PROJECT_DIR="/home/nicocr/zenith"
          HEALTH_URL="https://zenith.nicocereais.com.br/apiv1/health"
          # Converter para minúsculo via shell para o deploy local
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_URL="ghcr.io/$REPO_LOWER:latest"

          mkdir -p "$PROJECT_DIR"
          echo "📂 Atualizando infraestrutura..."
          cp docker-compose.yml "$PROJECT_DIR/docker-compose.yml"

          cd "$PROJECT_DIR" || exit 1

          echo "📝 Restaurando segredos..."
          echo "$ENV_FILE_CONTENT" > .env
          
          # Salva o ID da imagem atual para rollback caso falte saúde no container novo
          OLD_IMAGE_ID=$(docker inspect --format='{{.Image}}' zenith-api-1 2>/dev/null || true)
          
          echo "⬇️ Baixando nova imagem do GHCR.io..."
          docker pull "$IMAGE_URL"
          
          echo "🚀 Recriando containers..."
          docker compose up -d --force-recreate --remove-orphans

          echo "⏳ Aguardando 30s para estabilização..."
          sleep 30

          echo "🔍 Testando: $HEALTH_URL"
          if curl --silent --fail "$HEALTH_URL"; then
              echo "✅ DEPLOY SUCESSO!"
              docker image prune -f
          else
              echo "🚨 FALHA NO HEALTH CHECK! Iniciando Rollback..."
              if [ -n "$OLD_IMAGE_ID" ]; then
                  # Retorna para a imagem anterior usando o ID salvo
                  docker tag "$OLD_IMAGE_ID" "$IMAGE_URL"
                  docker compose up -d --force-recreate
                  echo "♻️ Rollback para imagem anterior concluído."
                  exit 1
              else
                  echo "❌ Sem imagem anterior para rollback."
                  exit 1
              fi
          fi