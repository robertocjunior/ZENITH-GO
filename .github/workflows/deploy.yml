name: CI/CD Pipeline (Hybrid)

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-local:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Login to GitHub Container Registry (Local)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Env, Restart and Check
        # AQUI ESTÁ A MÁGICA: Passamos o segredo como variável de ambiente para o script
        env:
          ENV_FILE_CONTENT: ${{ secrets.PROD_ENV_FILE }}
        run: |
          # 1. Configurações
          PROJECT_DIR="/home/nicocr/zenith"
          # Lemos a porta direto do conteúdo do .env para usar no teste do curl
          # (Isso é um truque para pegar a porta sem precisar configurar outro secret)
          APP_PORT=$(echo "$ENV_FILE_CONTENT" | grep "^PORT=" | cut -d'=' -f2)
          # Se não achar porta no arquivo, usa 8080 padrão
          APP_PORT=${APP_PORT:-8080}
          
          HEALTH_URL="https://zenith.nicocereais.com.br/apiv1/health"
          
          IMAGE_URL="ghcr.io/${{ github.repository }}:latest"
          IMAGE_URL=$(echo "$IMAGE_URL" | tr '[:upper:]' '[:lower:]')

          echo "📂 Verificando diretório..."
          if [ -d "$PROJECT_DIR" ]; then
            cd "$PROJECT_DIR"
            echo "✅ Entrou em: $(pwd)"
          else
            echo "❌ ERRO CRÍTICO: A pasta $PROJECT_DIR não existe no servidor!"
            exit 1
          fi

          # 2. ATUALIZAR O ARQUIVO .ENV
          echo "📝 Atualizando arquivo .env com as credenciais do GitHub..."
          echo "$ENV_FILE_CONTENT" > .env
          
          # 3. Identificar imagem antiga (para rollback)
          OLD_IMAGE_ID=$(docker inspect --format='{{.Image}}' zenith-api-1 2>/dev/null || true)
          
          if [ -z "$OLD_IMAGE_ID" ]; then
             echo "🆕 Nenhum container anterior encontrado."
          else
             echo "💾 ID da versão atual para backup: $OLD_IMAGE_ID"
          fi

          # 4. Atualizar
          echo "⬇️ Baixando nova imagem..."
          docker compose pull
          
          echo "🚀 Recriando containers..."
          # O docker compose vai ler o .env que acabamos de criar automaticamente
          docker compose up -d --force-recreate

          # 5. Teste de Saúde
          echo "⏳ Aguardando 30 segundos para subir..."
          sleep 30

          echo "🔍 Testando URL: $HEALTH_URL"
          if curl --silent --fail "$HEALTH_URL"; then
              echo "✅ SUCESSO! Aplicação está online e atualizada."
              docker image prune -f
          else
              echo "🚨 FALHA! A URL $HEALTH_URL não respondeu corretamente."
              echo "↩️ INICIANDO ROLLBACK..."
              
              if [ -n "$OLD_IMAGE_ID" ]; then
                  # Rollback: restaura a imagem antiga
                  docker tag "$OLD_IMAGE_ID" "$IMAGE_URL"
                  # O .env novo continua lá, o que é bom, pois se o erro foi código, 
                  # a configuração nova pode ser necessária.
                  docker compose up -d --force-recreate
                  echo "✅ Rollback executado para versão: $OLD_IMAGE_ID"
                  exit 1
              else
                  echo "❌ Impossível fazer rollback."
                  exit 1
              fi
          fi