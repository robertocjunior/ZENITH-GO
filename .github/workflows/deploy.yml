name: CI/CD Pipeline (Hybrid)

on:
  push:
    branches: [ "main" ]
    # Seus filtros de ignore
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.dockerignore'
      - '.gitignore'
      - 'docs/**'
      - '**/*.md'
      - '.air.toml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-local:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry (Local)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Process
        env:
          ENV_FILE_CONTENT: ${{ secrets.PROD_ENV_FILE }}
        run: |
          PROJECT_DIR="/home/nicocr/zenith"
          HEALTH_URL="https://zenith.nicocereais.com.br/apiv1/health"
          IMAGE_URL="ghcr.io/${{ github.repository }}:latest"
          IMAGE_URL=$(echo "$IMAGE_URL" | tr '[:upper:]' '[:lower:]')

          mkdir -p "$PROJECT_DIR"
          echo "📂 Atualizando infraestrutura..."
          cp docker-compose.yml "$PROJECT_DIR/docker-compose.yml"

          cd "$PROJECT_DIR" || exit 1

          echo "📝 Restaurando segredos..."
          echo "$ENV_FILE_CONTENT" > .env
          
          OLD_IMAGE_ID=$(docker inspect --format='{{.Image}}' zenith-api-1 2>/dev/null || true)
          
          echo "⬇️ Baixando e recriando..."
          docker compose pull
          docker compose up -d --force-recreate --remove-orphans